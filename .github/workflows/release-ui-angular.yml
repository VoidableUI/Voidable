# SPDX-License-Identifier: MIT
name: Release Angular Adapter Package

on:
  push:
    branches: [master]
    paths:
      - 'packages/angular/**'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3

      - name: Install and build
        run: |
          pnpm install
          pnpm --filter @voidable/ui build
          pnpm --filter @voidable/ui-angular build

      - name: Test
        run: pnpm --filter @voidable/ui-angular test

  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    needs: build
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
      should_release: ${{ steps.check_tag.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag_version
        uses: Work-Fort/github-tag-action@v6.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: master
          tag_prefix: ui-angular-v
          paths: packages/angular/**

      - name: Check if new tag was created
        id: check_tag
        run: |
          if [ -n "$TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ steps.tag_version.outputs.new_tag }}

  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: jdx/mise-action@v3

      - name: Build and publish
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(echo "$TAG" | sed 's|^ui-angular-v||')
          pnpm install
          pnpm --filter @voidable/ui build
          cd packages/angular
          npm pkg set version="$VERSION"
          pnpm run build
          npm publish --provenance --access public
          npm pack
          mv voidable-ui-angular-*.tgz ../..

      - name: Create release notes
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          CHANGELOG: ${{ needs.tag.outputs.changelog }}
        run: |
          VERSION=$(echo "$TAG" | sed 's|^ui-angular-v||')
          cat > release-notes.md << EOF
          # @voidable/ui-angular v${VERSION}

          ## What's Changed

          ${CHANGELOG}

          ## Installation

          \`\`\`bash
          npm install @voidable/ui-angular@${VERSION}
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: "@voidable/ui-angular ${{ needs.tag.outputs.new_tag }}"
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: voidable-ui-angular-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
