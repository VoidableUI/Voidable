# SPDX-License-Identifier: MIT
name: Release Theme Package

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'packages/theme/**'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3
        with:
          install_args: "node npm:pnpm"
        env:
          MISE_NOT_FOUND_AUTO_INSTALL: "false"

      - name: Install
        run: pnpm install

  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    needs: build
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
      should_release: ${{ steps.check_tag.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag_version
        uses: Work-Fort/github-tag-action@v6.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: master
          tag_prefix: theme-v
          paths: packages/theme/**

      - name: Check if new tag was created
        id: check_tag
        run: |
          if [ -n "$TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ steps.tag_version.outputs.new_tag }}

  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: jdx/mise-action@v3
        with:
          install_args: "node npm:pnpm"
        env:
          MISE_NOT_FOUND_AUTO_INSTALL: "false"

      - name: Publish
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          VERSION=$(echo "$TAG" | sed 's|^theme-v||')
          pnpm install
          cd packages/theme
          npm pkg set version="$VERSION"
          npm publish --provenance --access public
          npm pack
          mv voidable-theme-*.tgz ../..

      - name: Create release notes
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          CHANGELOG: ${{ needs.tag.outputs.changelog }}
        run: |
          VERSION=$(echo "$TAG" | sed 's|^theme-v||')
          cat > release-notes.md << EOF
          # @voidable/theme v${VERSION}

          ## What's Changed

          ${CHANGELOG}

          ## Installation

          \`\`\`bash
          npm install @voidable/theme@${VERSION}
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: "@voidable/theme ${{ needs.tag.outputs.new_tag }}"
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: voidable-theme-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
