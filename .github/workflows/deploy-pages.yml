# SPDX-License-Identifier: MIT
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3
        with:
          install_args: "node npm:pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Get latest UI version
        id: get_version
        run: |
          TAG=$(git tag --list 'ui-v*' --sort=-v:refname | head -n1)
          if [ -n "$TAG" ]; then
            VERSION=$(echo "$TAG" | sed 's|^ui-v||')
            echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs site
        run: pnpm --filter docs build
        env:
          VOIDABLE_VERSION: ${{ steps.get_version.outputs.version }}

      - name: Build Storybook
        run: pnpm --filter @voidable/storybook build

      - name: Merge artifacts
        run: |
          mkdir -p _site
          cp -r docs/dist/* _site/
          cp -r storybook-static _site/storybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
