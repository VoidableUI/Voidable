# SPDX-License-Identifier: MIT
name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Release UI Package"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3
        with:
          install_args: "node npm:pnpm"
        env:
          MISE_NOT_FOUND_AUTO_INSTALL: "false"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Get latest UI version
        id: get_version
        run: |
          TAG=$(git tag --list 'ui-v[0-9]*' --sort=-v:refname | head -n1)
          if [ -n "$TAG" ]; then
            VERSION=$(echo "$TAG" | sed 's|^ui-v||')
            echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Get UI bundle size
        id: get_bundle_size
        run: |
          BYTES=$(gzip -c packages/ui/dist/ui.js | wc -c)
          KB=$(echo "scale=1; $BYTES / 1024" | bc)
          echo "size=${KB} kB" >> "$GITHUB_OUTPUT"

      - name: Build docs site
        run: pnpm --filter docs build
        env:
          VOIDABLE_VERSION: ${{ steps.get_version.outputs.version }}
          VOIDABLE_BUNDLE_SIZE: ${{ steps.get_bundle_size.outputs.size }}

      - name: Build Storybook
        run: pnpm --filter @voidable/storybook build

      - name: Merge artifacts
        run: |
          mkdir -p _site
          cp -r docs/dist/* _site/
          cp -r storybook-static _site/storybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
