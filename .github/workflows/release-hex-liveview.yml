# SPDX-License-Identifier: MIT
name: Release live_voidable Hex Package

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'packages/liveview/hex/**'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install_args: "erlang elixir"
        env:
          MISE_NOT_FOUND_AUTO_INSTALL: "false"

      - name: Install dependencies
        working-directory: packages/liveview/hex
        run: mix deps.get

      - name: Run tests
        working-directory: packages/liveview/hex
        run: mix test

  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
      should_release: ${{ steps.check_tag.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag_version
        uses: Work-Fort/github-tag-action@v6.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: master
          tag_prefix: hex-liveview-v
          paths: packages/liveview/hex/**

      - name: Check if new tag was created
        id: check_tag
        run: |
          if [ -n "$TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ steps.tag_version.outputs.new_tag }}

  release:
    name: Publish to Hex
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: jdx/mise-action@v3
        with:
          install_args: "erlang elixir"
        env:
          MISE_NOT_FOUND_AUTO_INSTALL: "false"

      - name: Build and publish
        working-directory: packages/liveview/hex
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          VERSION=$(echo "$TAG" | sed 's|^hex-liveview-v||')
          sed -i "s/version:.*\".*\"/version: \"$VERSION\"/" mix.exs
          mix deps.get
          mix hex.publish --yes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: "live_voidable ${{ needs.tag.outputs.new_tag }}"
          body: ${{ needs.tag.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
